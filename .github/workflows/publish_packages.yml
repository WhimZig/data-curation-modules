name: Publish packages to GitHub Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        package:
          - whitespace_formatter
          - punctuation_formatter
          - ftfy_formatter
          - c4_filters
          - tno_quality_filter
          - gopher_quality_filter
          - gopher_repetition_filter
          - fineweb_quality_filter
          - pii_mappers
          - toxic_language_detection
          - nordicpile_quality_filter
          - machine_translation
          - quality_analysis
          - regex_formatter
          - llm_processing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: ${{ matrix.package }}
        run: python -m build

      - name: Publish to GitHub Packages
        working-directory: ${{ matrix.package }}
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          twine upload \
            --repository-url https://maven.pkg.github.com/WhimZig/data-curation-modules \
            dist/*
